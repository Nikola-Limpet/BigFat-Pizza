global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8081']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/api/metrics'
    # If your backend doesn't have metrics endpoint yet, this will show as down
    # You can add prom-client to backend later
