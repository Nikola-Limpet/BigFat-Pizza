name: CI/CD Pipeline (Quality Gate Fail Demo)

on:
  workflow_dispatch:

jobs:
  # This workflow intentionally fails at the quality gate
  # for demonstration / screenshot purposes
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: |
          cd backend && npm ci && npm test

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy:
    name: Trivy Security Scan (Strict)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy]
    if: always()
    steps:
      - name: Check Quality Gate Status
        run: |
          echo "SonarQube result: ${{ needs.sonarqube.result }}"
          echo "Trivy result: ${{ needs.trivy.result }}"
          if [ "${{ needs.sonarqube.result }}" != "success" ] || [ "${{ needs.trivy.result }}" != "success" ]; then
            echo "============================================"
            echo "  QUALITY GATE FAILED"
            echo "  Pipeline terminated. Fix issues first."
            echo "============================================"
            exit 1
          fi
          echo "Quality Gate Passed!"

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - run: echo "This step only runs if quality gate passes"
