name: CI/CD Pipeline - Build, Scan, and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/big-fat-pizza

jobs:
  # ==========================================
  # 1) TEST & BUILD
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            front-end/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Tests with Coverage
        working-directory: ./backend
        run: npm test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

      - name: Install Frontend Dependencies
        working-directory: ./front-end
        run: npm ci

      - name: Build Frontend
        working-directory: ./front-end
        run: npm run build

  # ==========================================
  # 2) SONARQUBE CODE QUALITY SCAN
  # ==========================================
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # 3) TRIVY SECURITY SCAN
  # ==========================================
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner (strict mode)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.sarif

  # ==========================================
  # 4) QUALITY GATE CHECK
  # If SonarQube or Trivy fails, this job will not run
  # ==========================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy]
    if: always() && needs.sonarqube.result == 'success' && needs.trivy.result == 'success'
    steps:
      - name: Check Quality Gate Status
        run: |
          echo "============================================"
          echo "  ALL QUALITY CHECKS PASSED"
          echo "  - Tests: OK"
          echo "  - SonarQube: OK"
          echo "  - Trivy Security: OK"
          echo "  Proceeding to Build & Deploy..."
          echo "============================================"

  # ==========================================
  # 5) BUILD & PUSH DOCKER IMAGES
  # ==========================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front-end
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-backend:buildcache,mode=max

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-nginx:latest

  # ==========================================
  # 6) DEPLOY TO AWS EC2
  # ==========================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create production env file
        run: |
          cat > .env.production << 'EOF'
          PORT=8080
          NODE_ENV=production
          MONGO_DB_URI=mongodb://admin:password@mongodb:27017/pizza?authSource=admin
          JWT_SECRET=${{ secrets.JWT_SECRET || 'default-jwt-secret-change-me' }}
          CORS_ORIGIN=http://${{ secrets.EC2_PUBLIC_IP }}
          VITE_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}/api
          EOF

      - name: Copy compose file and configs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.production,monitoring/"
          target: "~/bigfat-pizza/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Starting Deployment ==="
            
            cd ~/bigfat-pizza
            
            echo "Pulling latest images..."
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker-compose -f docker-compose.prod.yml pull
            
            echo "Restarting services..."
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Cleaning up old images..."
            docker image prune -af --filter "until=24h"
            
            echo "=== Deployment Complete ==="
            docker-compose -f docker-compose.prod.yml ps

      - name: Verify Deployment
        run: |
          echo "Waiting for services to start..."
          sleep 15
          curl -f http://${{ secrets.EC2_PUBLIC_IP }}/api/health || exit 1
          echo "Deployment verified successfully!"
